<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBlog · Séries & Filmes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.25s ease, border-color 0.25s ease, color 0.2s ease; }
        :root { --bg-body: #f8fafc; --bg-surface: #ffffff; --bg-card: #ffffff; --text-primary: #0f172a; --text-secondary: #334155; --text-muted: #64748b; --accent: #8b5cf6; --accent-hover: #7c3aed; --border: #e2e8f0; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02); --shadow-hover: 0 20px 30px -10px rgba(0, 0, 0, 0.15); --navbar-bg: rgba(255, 255, 255, 0.8); --header-bg: linear-gradient(145deg, #f1f5f9 0%, #e6edf5 100%); --footer-bg: #e6edf5; }
        body.dark { --bg-body: #0b1120; --bg-surface: #1e293b; --bg-card: #1e293b; --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #94a3b8; --accent: #a78bfa; --accent-hover: #b794f4; --border: #334155; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); --shadow-hover: 0 20px 30px -10px #00000066; --navbar-bg: rgba(30, 41, 59, 0.8); --header-bg: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); --footer-bg: #0f172a; }
        body { background-color: var(--bg-body); color: var(--text-primary); line-height: 1.5; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        .navbar { position: sticky; top: 0; backdrop-filter: blur(12px); background-color: var(--navbar-bg); border-bottom: 1px solid var(--border); z-index: 50; padding: 0.9rem 0; }
        .navbar .container { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #8b5cf6, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.03em; }
        .nav-links { display: flex; gap: 2.5rem; align-items: center; }
        .nav-links a { text-decoration: none; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }
        .theme-toggle { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 40px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: 500; color: var(--text-secondary); box-shadow: var(--shadow); }
        .theme-toggle i { font-size: 1.1rem; color: var(--accent); }
        .page-header { background: var(--header-bg); padding: 3rem 0 2.5rem 0; border-bottom: 1px solid var(--border); }
        .page-header h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
        .search-bar { display: flex; max-width: 500px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 60px; padding: 0.3rem 0.3rem 0.3rem 1.5rem; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
        .search-bar i { color: var(--text-muted); }
        .search-bar input { border: none; background: transparent; width: 100%; padding: 0.8rem 0.5rem; font-size: 1rem; color: var(--text-primary); outline: none; }
        .search-bar button { background: var(--accent); border: none; border-radius: 50px; padding: 0.7rem 1.5rem; color: white; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .search-bar button:hover { background: var(--accent-hover); }
        .filter-tabs { display: flex; flex-wrap: wrap; gap: 0.8rem; margin: 2rem 0 1rem; }
        .filter-btn { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 40px; padding: 0.6rem 1.5rem; font-weight: 600; font-size: 0.95rem; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .featured { margin: 3rem 0 3rem; }
        .featured-card { display: flex; flex-wrap: wrap; background: var(--bg-card); border-radius: 2rem; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); transition: box-shadow 0.3s; }
        .featured-card:hover { box-shadow: var(--shadow-hover); }
        .featured-img { flex: 1 1 300px; min-height: 280px; background-size: cover; background-position: center; }
        .featured-content { flex: 1 1 400px; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; }
        .featured-badge { background: var(--accent); color: white; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.85rem; font-weight: 600; width: fit-content; margin-bottom: 1rem; }
        .featured-content h2 { font-size: 2.2rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
        .featured-content p { color: var(--text-secondary); margin-bottom: 1.8rem; font-size: 1.1rem; }
        .section-title { font-size: 2rem; font-weight: 600; margin-bottom: 1.8rem; letter-spacing: -0.02em; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 4rem; }
        .post-card { background: var(--bg-card); border-radius: 1.5rem; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.3s; display: flex; flex-direction: column; }
        .post-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
        .card-img { height: 200px; background-size: cover; background-position: center; position: relative; }
        .card-category { position: absolute; top: 1rem; left: 1rem; background: var(--accent); color: white; font-size: 0.8rem; font-weight: 600; padding: 0.3rem 1rem; border-radius: 40px; letter-spacing: 0.3px; backdrop-filter: blur(2px); }
        .card-content { padding: 1.8rem 1.5rem 1.8rem; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.7rem; line-height: 1.3; }
        .card-excerpt { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.6; flex: 1; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1.2rem; margin-top: auto; }
        .read-more { color: var(--accent); font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; font-size: 0.95rem; }
        .post-date { color: var(--text-muted); font-size: 0.9rem; }
        .footer { background: var(--footer-bg); border-top: 1px solid var(--border); padding: 3rem 0; margin-top: 3rem; }
        .footer-content { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1.5rem; }
        .footer-copy { color: var(--text-muted); }
        .social-links { display: flex; gap: 1.8rem; }
        .social-links a { color: var(--text-secondary); font-size: 1.4rem; transition: color 0.2s; }
        .social-links a:hover { color: var(--accent); }
        @media (max-width: 640px) { .container { padding: 0 1.5rem; } .page-header h1 { font-size: 2rem; } .featured-content { padding: 1.8rem; } .navbar .container { flex-wrap: wrap; gap: 1rem; } .nav-links { gap: 1.2rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">CineBlog</div>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="#">Filmes</a>
                <a href="#">Séries</a>
                <a href="#">Reviews</a>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-sun"></i>
                    <span>Modo escuro</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Explorar <span style="color: var(--accent);">Séries & Filmes</span></h1>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por título...">
                <button id="searchBtn">Ir</button>
            </div>
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="filme">Filmes</button>
                <button class="filter-btn" data-filter="serie">Séries</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="featured">
            <div class="featured-card">
                <div class="featured-img" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=600&h=400&fit=crop');"></div>
                <div class="featured-content">
                    <span class="featured-badge"><i class="fas fa-star" style="margin-right: 6px;"></i>Destaque</span>
                    <h2>A Magia do Cinema Automatizado</h2>
                    <p>Conteúdo gerado em tempo real por inteligência artificial.</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="section-title">Artigos <span style="color: var(--accent);">recentes</span></h2>
            <div class="posts-grid" id="postsGrid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-copy">© 2025 CineBlog — Feito para fãs de séries e filmes</div>
            <div class="social-links">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            let allPosts = [];
            const grid = document.getElementById('postsGrid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            let currentFilter = 'all';
            let searchTerm = '';

            async function fetchPosts() {
                try {
                    // Adicionado ?t= para evitar cache do GitHub Pages
                    const response = await fetch('posts.json?t=' + Date.now());
                    const data = await response.json();
                    
                    // Tratamento para garantir que pegamos a lista correta, independente do formato do n8n
                    allPosts = Array.isArray(data) ? data : (data.conteudo_final ? JSON.parse(data.conteudo_final) : []);
                    
                    filterPosts();
                } catch (error) {
                    console.error("Erro ao carregar posts.json:", error);
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Erro ao carregar os artigos. Verifique se posts.json existe.</p>";
                }
            }

            function renderPosts(filteredPosts) {
                if (!grid) return;
                if (filteredPosts.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center;">Nenhum post encontrado 😢</p>`;
                    return;
                }

                grid.innerHTML = filteredPosts.map(post => `
                    <article class="post-card">
                        <div class="card-img" style="background-image: url('${post.image || ''}');">
                            <span class="card-category">${post.category === 'filme' ? '🎬 Filme' : '📺 Série'}</span>
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${post.title.replace('\\n', '')}</h3>
                            <p class="card-excerpt">${post.excerpt.replace('\\n', '')}</p>
                            <div class="card-meta">
                                <a href="${post.url}" class="read-more">Ler mais <i class="fas fa-arrow-right"></i></a>
                                <span class="post-date">${post.date}</span>
                            </div>
                        </div>
                    </article>
                `).join('');
            }

            function filterPosts() {
                let filtered = allPosts;
                if (currentFilter !== 'all') filtered = filtered.filter(p => p.category === currentFilter);
                if (searchTerm.trim() !== '') {
                    const term = searchTerm.trim().toLowerCase();
                    filtered = filtered.filter(p => p.title.toLowerCase().includes(term));
                }
                renderPosts(filtered);
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    filterPosts();
                });
            });

            searchBtn.addEventListener('click', () => { searchTerm = searchInput.value; filterPosts(); });
            searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') { searchTerm = searchInput.value; filterPosts(); } });

            fetchPosts();

            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            });
        })();
    </script>
</body>
</html>
